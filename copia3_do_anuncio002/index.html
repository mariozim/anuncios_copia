
<p>versão 1.1</p>
<form id="formLeads" action="https://script.google.com/macros/s/AKfycbzhYYZr0ugNNYKtFmERT8U7cmPHY3AmLZYHITvIm42tsWcKYi7Bo-8gQ543FbPNmPs/exec" method="POST">
  <input type="text" name="nome" placeholder="Seu primeiro nome" required>
  
  <input type="tel" name="whatsapp" placeholder="Seu WhatsApp com DDD" required>
  
  <button type="submit" id="btnEnviar">QUERO AS PROMOÇÕES AGORA</button>
</form>

<script>
  const form = document.getElementById('formLeads');
  const linkDoGrupo = "https://chat.whatsapp.com/SEU_LINK_AQUI";

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('btnEnviar');
    btn.innerText = "Salvando seu acesso...";
    btn.disabled = true;

    if (typeof fbq !== 'undefined') {
      fbq('track', 'Lead');
    }

    fetch(form.action, {
      method: 'POST',
      body: new FormData(form),
      mode: 'no-cors'
    })
    .then(() => {
      window.location.href = linkDoGrupo;
    })
    .catch(() => {
      window.location.href = linkDoGrupo;
    });
  });
</script>
